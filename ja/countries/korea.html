<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/shotsim/assets/img/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/shotsim/assets/img/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/shotsim/assets/img/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/shotsim/assets/img/apple-touch-icon.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>韓国のSIM比較 | ShotSIM</title>
    <meta
      name="description"
      content="韓国旅行で使えるSIM・eSIMを比較。対応国・通信規格・SIMサイズ・価格を一覧で確認できます。"
    />
    <!-- OGP -->
    <meta property="og:title" content="韓国のSIM比較 | ShotSIM" />
    <meta
      property="og:description"
      content="韓国旅行で使えるSIM・eSIMを比較。対応国・通信規格・SIMサイズ・価格を一覧で確認できます。"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://shotsim.net/ja/countries/korea.html"
    />
    <meta property="og:locale" content="ja" />
    <meta name="twitter:card" content="summary" />
    <!-- hreflang -->
    <link
      rel="alternate"
      hreflang="ja"
      href="https://shotsim.net/ja/countries/korea.html"
    />
    <link
      rel="alternate"
      hreflang="en"
      href="https://shotsim.net/en/countries/korea.html"
    />
    <link
      rel="alternate"
      hreflang="zh-TW"
      href="https://shotsim.net/zh-tw/countries/korea.html"
    />
    <link
      rel="alternate"

      href="https://shotsim.net/zh-cn/countries/korea.html"
    />
    <link

      hreflang="ko"
      href="https://shotsim.net/ko/countries/korea.html"
    />
    <link

      href="https://shotsim.net/ja/countries/korea.html"
    />
    <link rel="stylesheet" href="/shotsim/assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .country-page {
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 24px 60px;
      }
      .country-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 8px;
      }
      .country-header .flag {
        font-size: 3rem;
      }
      .country-header h1 {
        font-size: 1.8rem;
      }
      .data-note {
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 24px;
      }

      /* フィルター */
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 20px;
        align-items: center;
      }
      .filter-bar label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #555;
      }
      .filter-bar select {
        padding: 6px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.85rem;
      }
      .filter-count {
        font-size: 0.85rem;
        color: #888;
        margin-left: auto;
      }

      /* テーブル */
      .sim-table-wrap {
        overflow: auto;
        max-height: 80vh;
      }
      .sim-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 0.88rem;
      }
      /* ヘッダー行：上固定 */
      .sim-table th {
        background: #f0f4ff;
        font-weight: 600;
        padding: 10px 12px;
        border: 1px solid #ddd;
        white-space: nowrap;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 2;
      }
      .sim-table td {
        border: 1px solid #ddd;
        padding: 10px 12px;
        vertical-align: middle;
      }
      /* 偶数行・ホバー（固定列以外） */
      .sim-table tr:nth-child(even) td:not(:nth-child(1)):not(:nth-child(2)) {
        background: #fafafa;
      }
      .sim-table tr:hover td:not(:nth-child(1)):not(:nth-child(2)) {
        background: #f5f8ff;
      }

      /* #列（1列目）：左固定 */
      .sim-table th:nth-child(1),
      .sim-table td:nth-child(1) {
        position: sticky;
        left: 0;
        z-index: 2;
        width: 36px;
        min-width: 36px;
        max-width: 36px;
        background: #fff;
      }
      .sim-table th:nth-child(1) {
        background: #f0f4ff;
        z-index: 4;
      }
      .sim-table tr:nth-child(even) td:nth-child(1) {
        background: #fafafa;
      }
      .sim-table tr:hover td:nth-child(1) {
        background: #f5f8ff;
      }

      /* 商品列（2列目）：左固定 */
      .sim-table th:nth-child(2),
      .sim-table td:nth-child(2) {
        position: sticky;
        left: 36px;
        z-index: 2;
        background: #fff;
        border-right: 2px solid #ddd;
      }
      .sim-table th:nth-child(2) {
        background: #f0f4ff;
        z-index: 4;
      }
      .sim-table tr:nth-child(even) td:nth-child(2) {
        background: #fafafa;
      }
      .sim-table tr:hover td:nth-child(2) {
        background: #f5f8ff;
      }

      /* 商品名セル */
      .product-cell {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        min-width: 240px;
        max-width: 380px;
      }
      .product-img {
        width: 60px;
        height: 60px;
        object-fit: contain;
        background: #f5f5f5;
        border: 1px solid #eee;
        border-radius: 4px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #bbb;
        font-size: 0.7rem;
      }
      .product-img img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .product-info {
      }
      .product-id {
        font-size: 0.72rem;
        color: #aaa;
      }
      .product-name {
        font-size: 0.82rem;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .product-brand {
        font-size: 0.78rem;
        color: #555;
        margin-top: 2px;
      }

      /* バッジ */
      .badge {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 600;
        white-space: nowrap;
      }
      .badge-esim {
        background: #e8f0fe;
        color: #1a73e8;
      }
      .badge-physical {
        background: #fce8e6;
        color: #c5221f;
      }
      .badge-both {
        background: #e6f4ea;
        color: #1e7e34;
      }

      /* ○✕ */
      .ok {
        color: #1a7a4a;
        font-weight: 700;
      }
      .ng {
        color: #c5221f;
      }
      .unknown {
        color: #aaa;
        font-size: 0.8rem;
      }

      /* 対応国タグ */
      .countries-cell {
        min-width: 120px;
        max-width: 200px;
      }
      .country-tag {
        display: inline-block;
        background: #f0f4ff;
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 0.72rem;
        margin: 1px;
        white-space: nowrap;
      }
      .country-tag-more {
        color: #888;
        font-size: 0.72rem;
      }

      /* 通信規格 */
      .network-cell {
        white-space: nowrap;
      }
      .net-tag {
        display: inline-block;
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 0.72rem;
        margin: 1px;
      }
      .net-5g {
        background: #e8f0fe;
        color: #1a73e8;
      }
      .net-4g {
        background: #e6f4ea;
        color: #1e7e34;
      }
      .net-lte {
        background: #fff3e0;
        color: #e65100;
      }
      .net-3g {
        background: #fce8e6;
        color: #c5221f;
      }

      /* 価格 */
      .price-cell {
        white-space: nowrap;
        text-align: right;
      }
      .price-val {
        font-weight: 700;
        font-size: 1rem;
      }
      .price-date {
        font-size: 0.7rem;
        color: #aaa;
        display: block;
      }

      /* レビュー */
      .review-cell {
        white-space: nowrap;
        text-align: center;
      }
      .stars {
        color: #f5a623;
        font-size: 0.85rem;
      }

      /* Amazonボタン */
      .amazon-btn {
        display: inline-block;
        padding: 6px 14px;
        background: #ff9900;
        color: #fff;
        border-radius: 4px;
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 600;
        white-space: nowrap;
      }
      .amazon-btn:hover {
        background: #e68900;
      }

      /* 会社・キャリア */
      .company-cell {
        font-size: 0.82rem;
        min-width: 100px;
      }
      .company-original {
        font-size: 0.72rem;
        color: #888;
      }

      @media (max-width: 768px) {
        .sim-table {
          font-size: 0.78rem;
        }
        .product-cell {
          min-width: 160px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/shotsim/" class="logo">📡 ShotSIM</a>
      <nav class="lang-nav">
        <a href="/shotsim/ja/countries/korea.html" class="active">日本語</a>
        <a href="/shotsim/en/countries/korea.html">English</a>
        <a href="/shotsim/zh-tw/countries/korea.html">繁體中文</a>
        <a href="/shotsim/zh-cn/countries/korea.html">简体中文</a>
        <a href="/shotsim/ko/countries/korea.html">한국어</a>
      </nav>
    </header>

    <div class="country-page">
      <div class="country-header">
        <div class="flag">🇰🇷</div>
        <div>
          <h1>韓国のSIM比較</h1>
        </div>
      </div>
      <p class="data-note" id="data-note">読み込み中...</p>

      <!-- フィルター -->
      <div class="filter-bar">
        <label>種別:</label>
        <select id="filter-type">
          <option value="">すべて</option>
          <option value="eSIM">eSIM</option>
          <option value="物理SIM">物理SIM</option>
        </select>
        <label>期間:</label>
        <select id="filter-days">
          <option value="">すべて</option>
          <option value="3">〜3日</option>
          <option value="7">〜7日</option>
          <option value="14">〜14日</option>
          <option value="30">〜30日</option>
          <option value="999">30日以上</option>
        </select>
        <label>通話:</label>
        <select id="filter-voice">
          <option value="">すべて</option>
          <option value="1">通話あり</option>
          <option value="0">データのみ</option>
        </select>
        <span class="filter-count" id="filter-count"></span>
      </div>

      <div class="sim-table-wrap">
        <table class="sim-table" id="sim-table">
          <thead>
            <tr>
              <th>#</th>
              <th>商品</th>
              <th>種別</th>
              <th>物理SIMサイズ<br /><small>nano / micro / 標準</small></th>
              <th>対応国</th>
              <th>現地キャリア<br /><small>（韓国）</small></th>
              <th>通信規格</th>
              <th>データ</th>
              <th>期間</th>
              <th>通話</th>
              <th>SMS</th>
              <th>テザリング</th>
              <th>レビュー</th>
              <th>価格</th>
              <th>購入</th>
            </tr>
          </thead>
          <tbody id="sim-tbody"></tbody>
        </table>
      </div>
    </div>

    <script>
      const COUNTRY_KEY = "korea";

      function renderBool(val) {
        if (val === true) return '<span class="ok">○</span>';
        if (val === false) return '<span class="ng">✕</span>';
        return '<span class="unknown">-</span>';
      }

      function renderSimSizes(sizes, type) {
        if (!type || type.includes("eSIM"))
          return '<span class="unknown">-</span>';
        if (
          !sizes ||
          (sizes.nano === null &&
            sizes.micro === null &&
            sizes.standard === null)
        ) {
          return '<span class="unknown">不明</span>';
        }
        const nano =
          sizes.nano === true
            ? '<span class="ok">○</span>'
            : sizes.nano === false
              ? '<span class="ng">✕</span>'
              : '<span class="unknown">-</span>';
        const micro =
          sizes.micro === true
            ? '<span class="ok">○</span>'
            : sizes.micro === false
              ? '<span class="ng">✕</span>'
              : '<span class="unknown">-</span>';
        const std =
          sizes.standard === true
            ? '<span class="ok">○</span>'
            : sizes.standard === false
              ? '<span class="ng">✕</span>'
              : '<span class="unknown">-</span>';
        return `${nano} / ${micro} / ${std}`;
      }

      function renderCountries(countries) {
        if (!countries || countries.length === 0)
          return '<span class="unknown">-</span>';
        const MAX_SHOW = 4;
        const shown = countries.slice(0, MAX_SHOW);
        const rest = countries.length - MAX_SHOW;
        let html = shown
          .map((c) => `<span class="country-tag">${c}</span>`)
          .join("");
        if (rest > 0)
          html += `<span class="country-tag-more"> 他${rest}カ国</span>`;
        return `<div class="countries-cell">${html}</div>`;
      }

      function renderNetwork(nets) {
        if (!nets || nets.length === 0) return '<span class="unknown">-</span>';
        return (
          '<span class="network-cell">' +
          nets
            .map((n) => {
              if (n === "5G") return `<span class="net-tag net-5g">5G</span>`;
              if (n === "4G") return `<span class="net-tag net-4g">4G</span>`;
              if (n === "LTE")
                return `<span class="net-tag net-lte">LTE</span>`;
              if (n === "3G") return `<span class="net-tag net-3g">3G</span>`;
              return `<span class="net-tag">${n}</span>`;
            })
            .join("") +
          "</span>"
        );
      }

      function renderType(type) {
        const t = type || "";
        if (t.includes("eSIM"))
          return `<span class="badge badge-esim">eSIM</span>`;
        if (t.includes("両対応"))
          return `<span class="badge badge-both">両対応</span>`;
        if (t.includes("物理"))
          return `<span class="badge badge-physical">物理SIM</span>`;
        return `<span class="badge">${t}</span>`;
      }

      function renderProduct(sim) {
        const imgHtml = sim.image_url
          ? `<div class="product-img"><img src="${sim.image_url}" alt="${sim.product_name}" loading="lazy"></div>`
          : `<div class="product-img">準備中</div>`;
        const brandLocal = sim.brand && sim.brand.local ? sim.brand.local : "";
        const companyLocal =
          sim.company && sim.company.local ? ` / ${sim.company.local}` : "";
        return `<div class="product-cell">
        ${imgHtml}
        <div class="product-info">
          <div class="product-id">${sim.id}</div>
          <div class="product-name">${sim.product_name}</div>
          <div class="product-brand">${brandLocal}${companyLocal}</div>
        </div>
      </div>`;
      }

      function renderPrice(sim) {
        const price =
          sim.price_min === sim.price_max
            ? `¥${sim.price_min.toLocaleString()}`
            : `¥${sim.price_min.toLocaleString()}〜`;
        const date = sim.price_fetched_at
          ? `<span class="price-date">${sim.price_fetched_at} 時点</span>`
          : "";
        return `<div class="price-cell"><span class="price-val">${price}</span>${date}</div>`;
      }

      function renderReview(sim) {
        if (!sim.review_score && !sim.review_count)
          return '<span class="unknown">-</span>';
        const stars = sim.review_score
          ? `<span class="stars">★${sim.review_score.toFixed(1)}</span>`
          : "";
        const count = sim.review_count
          ? `<br><small>(${sim.review_count}件)</small>`
          : "";
        return `<div class="review-cell">${stars}${count}</div>`;
      }

      function renderCarrier(sim) {
        const kr =
          sim.carrier && sim.carrier["韓国"] ? sim.carrier["韓国"] : null;
        if (!kr) return '<span class="unknown">-</span>';
        return `<span style="font-size:0.82rem">${kr}</span>`;
      }

      function applyFilters(sims) {
        const typeVal = document.getElementById("filter-type").value;
        const daysVal = document.getElementById("filter-days").value;
        const voiceVal = document.getElementById("filter-voice").value;
        return sims.filter((s) => {
          // 対応国フィルター（韓国を含むもののみ表示）
          const countries = s.countries || [];
          if (!countries.includes("韓国")) return false;
          // 種別
          if (typeVal && !s.type.includes(typeVal)) return false;
          // 期間
          if (daysVal) {
            const d = parseInt(daysVal);
            if (d === 999) {
              if (s.days <= 30) return false;
            } else {
              if (s.days > d) return false;
            }
          }
          // 通話
          if (voiceVal === "1" && s.voice_call !== true) return false;
          if (voiceVal === "0" && s.voice_call !== false) return false;
          return true;
        });
      }

      function renderTable(sims) {
        const filtered = applyFilters(sims);
        const tbody = document.getElementById("sim-tbody");
        document.getElementById("filter-count").textContent =
          `${filtered.length}件表示`;

        tbody.innerHTML = filtered
          .map(
            (sim, idx) => `
        <tr>
          <td style="text-align:center;color:#aaa;font-size:0.8rem">${idx + 1}</td>
          <td>${renderProduct(sim)}</td>
          <td style="text-align:center">${renderType(sim.type)}</td>
          <td style="text-align:center">${renderSimSizes(sim.sim_sizes, sim.type)}</td>
          <td>${renderCountries(sim.countries)}</td>
          <td style="text-align:center">${renderCarrier(sim)}</td>
          <td>${renderNetwork(sim.network)}</td>
          <td style="text-align:center;white-space:nowrap">${sim.data || "-"}</td>
          <td style="text-align:center;white-space:nowrap">${sim.days}日間</td>
          <td style="text-align:center">${renderBool(sim.voice_call)}</td>
          <td style="text-align:center">${renderBool(sim.sms)}</td>
          <td style="text-align:center">${renderBool(sim.tethering)}</td>
          <td>${renderReview(sim)}</td>
          <td>${renderPrice(sim)}</td>
          <td><a href="${sim.affiliate_url || `https://www.amazon.co.jp/dp/${sim.asin}?tag=shotsim-22`}" class="amazon-btn" target="_blank" rel="noopener">Amazonで見る</a></td>
        </tr>
      `,
          )
          .join("");
      }

      async function init() {
        const res = await fetch("/shotsim/data/sims.json");
        const data = await res.json();
        const group = data.find((g) => g.country === COUNTRY_KEY);
        if (!group) {
          document.getElementById("sim-tbody").innerHTML =
            '<tr><td colspan="15">データが見つかりません</td></tr>';
          return;
        }
        const sims = group.sims || [];
        const fetched =
          sims[0] && sims[0].price_fetched_at
            ? sims[0].price_fetched_at
            : "不明";
        document.getElementById("data-note").textContent =
          `価格は ${fetched} 時点のAmazon掲載価格です。最新価格はAmazonでご確認ください。`;
        // フィルター変更イベント
        ["filter-type", "filter-days", "filter-voice"].forEach((id) => {
          document
            .getElementById(id)
            .addEventListener("change", () => renderTable(sims));
        });
        renderTable(sims);
      }

      init();
    </script>
  </body>
</html>
