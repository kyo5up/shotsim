    <link rel="alternate" hreflang="zh-CN" href="https://shotsim.net/zh-cn/countries/korea.html" />
    <link rel="alternate" hreflang="ko" href="https://shotsim.net/ko/countries/korea.html" />

    <style>
      .country-page {
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 24px 60px;
      }
      .country-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 8px;
      }
      .country-header .flag { font-size: 3rem; }
      .country-header h1 { font-size: 1.8rem; }
      .data-note {
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 24px;
      }

      /* フィルターパネル */
      .filter-panel {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 12px 16px;
        margin-bottom: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: flex-end;
      }
      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .filter-group-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .filter-group select {
        padding: 5px 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.85rem;
        background: #fafafa;
      }
      /* ■ラジオ式フィルター */
      .radio-filter-group {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .radio-filter {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        color: #444;
        user-select: none;
      }
      .radio-filter .radio-box {
        width: 12px;
        height: 12px;
        background: #ddd;
        border-radius: 2px;
        flex-shrink: 0;
        transition: background 0.12s;
      }
      .radio-filter.active .radio-box {
        background: #1A3263;
      }
      .radio-filter:hover:not(.active) .radio-box {
        background: #aab8d8;
      }

      /* フィルター右端：件数＋操作ボタン */
      .filter-meta {
        margin-left: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }
      .filter-count {
        font-size: 0.82rem;
        color: #888;
      }
      .filter-btns {
        display: flex;
        gap: 6px;
      }
      .action-btn {
        padding: 4px 12px;
        font-size: 0.8rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
        background: #fafafa;
        color: #555;
      }
      .action-btn:hover { background: #f0f0f0; }
      .action-btn.btn-clear { border-color: #d44; color: #d44; }
      .action-btn.btn-clear:hover { background: #fff0f0; }
      #btn-expand { border-color: #aaa; color: #444; }

      /* テーブル */
      .sim-table-wrap {
        overflow: auto;
        max-height: 80vh;
      }
      .sim-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 0.88rem;
      }
      /* ヘッダー行：上固定 */
      .sim-table th {
        background: #f0f4ff;
        font-weight: 600;
        padding: 10px 12px;
        border: 1px solid #ddd;
        white-space: nowrap;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 2;
      }
      .sim-table td {
        border: 1px solid #ddd;
        padding: 10px 12px;
        vertical-align: middle;
      }
      /* 偶数行・ホバー（通常列） */
      .sim-table tr:nth-child(even) td { background: #fafafa; }
      .sim-table tr:hover td { background: #f5f8ff; }

      /* #列（1列目）：左固定 */
      .sim-table th:nth-child(1),
      .sim-table td:nth-child(1) {
        position: sticky;
        left: 0;
        z-index: 3;
        background: #fff;
      }
      .sim-table th:nth-child(1) { background: #f0f4ff; z-index: 5; }
      .sim-table tr:nth-child(even) td:nth-child(1) { background: #fafafa; }
      .sim-table tr:hover td:nth-child(1) { background: #f5f8ff; }

      /* 商品名列（2列目）：左固定 */
      .sim-table th:nth-child(2),
      .sim-table td:nth-child(2) {
        position: sticky;
        left: 0;
        z-index: 3;
        background: #fff;
        border-right: 2px solid #ccc;
      }
      .sim-table th:nth-child(2) { background: #f0f4ff; z-index: 5; }
      .sim-table tr:nth-child(even) td:nth-child(2) { background: #fafafa; }
      .sim-table tr:hover td:nth-child(2) { background: #f5f8ff; }

      /* 商品名セル */
      .product-cell {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        min-width: 240px;
        max-width: 380px;
      }
      .product-img {
        width: 60px;
        height: 60px;
        object-fit: contain;
        background: #f5f5f5;
        border: 1px solid #eee;
        border-radius: 4px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #bbb;
        font-size: 0.7rem;
      }
      .product-img img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .product-id { font-size: 0.72rem; color: #aaa; }
      .product-name {
        font-size: 0.82rem;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .product-brand { font-size: 0.78rem; color: #555; margin-top: 2px; }

      /* バッジ */
      .badge {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 600;
        white-space: nowrap;
      }
      .badge-esim { background: #e8f0fe; color: #1A3263; }
      .badge-physical { background: #fce8e6; color: #c5221f; }
      .badge-both { background: #e6f4ea; color: #1e7e34; }

      /* ○✕ */
      .ok { color: #1a7a4a; font-weight: 700; }
      .ng { color: #c5221f; }
      .unknown { color: #aaa; font-size: 0.8rem; }

      /* 対応国タグ */
      .countries-cell { min-width: 120px; max-width: 200px; }
      .country-tag {
        display: inline-block;
        background: #f0f4ff;
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 0.72rem;
        margin: 1px;
        white-space: nowrap;
      }

      /* 通信規格 */
      .network-cell { white-space: nowrap; }
      .net-tag {
        display: inline-block;
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 0.72rem;
        margin: 1px;
      }
      .net-5g { background: #e8f0fe; color: #1A3263; }
      .net-4g { background: #e6f4ea; color: #1e7e34; }
      .net-lte { background: #fff3e0; color: #e65100; }
      .net-3g { background: #fce8e6; color: #c5221f; }

      /* 価格 */
      .price-cell { white-space: nowrap; text-align: right; }
      .price-val { font-weight: 700; font-size: 1rem; }
      .price-date { font-size: 0.7rem; color: #aaa; display: block; }

      /* レビュー */
      .review-cell { white-space: nowrap; text-align: center; }
      .stars { color: #f5a623; font-size: 0.85rem; }

      /* Amazonボタン */
      .amazon-btn {
        display: inline-block;
        padding: 6px 14px;
        background: #ff9900;
        color: #fff;
        border-radius: 4px;
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 600;
        white-space: nowrap;
      }
      .amazon-btn:hover { background: #e68900; }

      /* ソートボタン */
      .sort-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 0.7rem;
        color: #aaa;
        padding: 0 2px;
        vertical-align: middle;
      }
      .sort-btn.active-asc,
      .sort-btn.active-desc { color: #1A3263; font-weight: 700; }

      /* 型番・ASIN */
      .mono-cell {
        font-family: monospace;
        font-size: 0.78rem;
        color: #666;
        white-space: nowrap;
      }

      @media (max-width: 768px) {
        .sim-table { font-size: 0.78rem; }
        .product-cell { min-width: 160px; }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/shotsim/" class="logo">📡 ShotSIM</a>
      <nav class="lang-nav">
        <a href="/shotsim/ja/countries/korea.html" class="active">日本語</a>
        <a href="/shotsim/en/countries/korea.html">English</a>
        <a href="/shotsim/zh-tw/countries/korea.html">繁體中文</a>
        <a href="/shotsim/zh-cn/countries/korea.html">简体中文</a>
        <a href="/shotsim/ko/countries/korea.html">한국어</a>
      </nav>
    </header>

    <div class="country-page">
      <div class="country-header">
        <div class="flag">🇰🇷</div>
        <div><h1>韓国のSIM比較</h1></div>
      </div>
      <p class="data-note" id="data-note">読み込み中...</p>

      <!-- フィルターパネル -->
      <div class="filter-panel">
        <div class="filter-group">
          <div class="filter-group-label">種別</div>
          <div class="radio-filter-group" id="filter-type-group">
            <label class="radio-filter active" data-value=""><span class="radio-box"></span>すべて</label>
            <label class="radio-filter" data-value="eSIM"><span class="radio-box"></span>eSIM</label>
            <label class="radio-filter" data-value="物理SIM"><span class="radio-box"></span>物理SIM</label>
          </div>
        </div>
        <div class="filter-group">
          <div class="filter-group-label">期間</div>
          <select id="filter-days">
            <option value="">すべて</option>
            <option value="3">〜3日</option>
            <option value="7">〜7日</option>
            <option value="14">〜14日</option>
            <option value="30">〜30日</option>
            <option value="999">30日以上</option>
          </select>
        </div>
        <div class="filter-group">
          <div class="filter-group-label">通話</div>
          <div class="radio-filter-group" id="filter-voice-group">
            <label class="radio-filter active" data-value=""><span class="radio-box"></span>すべて</label>
            <label class="radio-filter" data-value="1"><span class="radio-box"></span>通話あり</label>
            <label class="radio-filter" data-value="0"><span class="radio-box"></span>データのみ</label>
          </div>
        </div>
        <div class="filter-meta">
          <span class="filter-count" id="filter-count"></span>
          <div class="filter-btns">
            <button class="action-btn btn-clear" onclick="clearFilters()">クリア</button>
            <button class="action-btn btn-undo" onclick="undoFilters()">戻す</button>
            <button class="action-btn" id="btn-expand" onclick="toggleExpand()">⛶ 全画面</button>
          </div>
        </div>
      </div>

      <div class="sim-table-wrap">
        <table class="sim-table" id="sim-table">
          <thead>
            <tr>
              <th>#</th>
              <th>商品名</th>
              <th>価格 <button class="sort-btn" data-col="price_min" onclick="sortTable('price_min')">▲▼</button></th>
              <th>購入</th>
              <th>種別<br /><small>物理SIMサイズ</small></th>
              <th>高速データ <button class="sort-btn" data-col="data_high" onclick="sortTable('data_high')">▲▼</button></th>
              <th>低速無制限</th>
              <th>期間 <button class="sort-btn" data-col="days" onclick="sortTable('days')">▲▼</button></th>
              <th>通話</th>
              <th>SMS</th>
              <th>テザリング</th>
              <th>対応国</th>
              <th>現地キャリア<br /><small>（韓国）</small></th>
              <th>通信規格</th>
              <th>☆平均 <button class="sort-btn" data-col="review_score" onclick="sortTable('review_score')">▲▼</button></th>
              <th>レビュー件数 <button class="sort-btn" data-col="review_count" onclick="sortTable('review_count')">▲▼</button></th>
              <th>会社名</th>
              <th>ブランド</th>
              <th>型番</th>
              <th>ASIN</th>
              <th>価格 <button class="sort-btn" data-col="price_min" onclick="sortTable('price_min')">▲▼</button></th>
              <th>購入</th>
            </tr>
          </thead>
          <tbody id="sim-tbody"></tbody>
        </table>
      </div>
    </div>

    <script>
      const COUNTRY_KEY = "korea";
      let allSims = [];
      let filteredSims = [];
      let sortCol = null;
      let sortDir = 1; // 1=昇順, -1=降順

      // フィルター状態
      let currentFilters = { type: "", days: "", voice: "" };
      let prevFilters = { type: "", days: "", voice: "" };

      // ------- トグル（元の動作を維持）-------
      function toggleExpand() {
        const page = document.querySelector('.country-page');
        const wrap = document.querySelector('.sim-table-wrap');
        const btn = document.getElementById('btn-expand');
        if (page.style.maxWidth === 'none') {
          page.style.maxWidth = '';
          page.style.padding = '';
          wrap.style.maxHeight = '';
          wrap.style.overflow = '';
          btn.textContent = '⛶ 全画面';
        } else {
          page.style.maxWidth = 'none';
          page.style.padding = '0 12px 60px';
          wrap.style.maxHeight = 'none';
          wrap.style.overflow = 'visible';
          btn.textContent = '⊡ 枠あり';
        }
      }

      // ------- ■ラジオ式フィルター -------
      function initBtnFilter(groupId, filterKey) {
        const group = document.getElementById(groupId);
        group.querySelectorAll('.radio-filter').forEach(label => {
          label.addEventListener('click', () => {
            group.querySelectorAll('.radio-filter').forEach(l => l.classList.remove('active'));
            label.classList.add('active');
            prevFilters = { ...currentFilters };
            currentFilters[filterKey] = label.dataset.value;
            renderTable();
          });
        });
      }

      function clearFilters() {
        prevFilters = { ...currentFilters };
        currentFilters = { type: "", days: "", voice: "" };
        applyFilterUI();
        renderTable();
      }

      function undoFilters() {
        const tmp = { ...currentFilters };
        currentFilters = { ...prevFilters };
        prevFilters = tmp;
        applyFilterUI();
        renderTable();
      }

      function applyFilterUI() {
        // ■ラジオ式
        ['filter-type-group', 'filter-voice-group'].forEach((groupId, i) => {
          const key = ['type', 'voice'][i];
          const group = document.getElementById(groupId);
          group.querySelectorAll('.radio-filter').forEach(label => {
            label.classList.toggle('active', label.dataset.value === currentFilters[key]);
          });
        });
        // セレクト
        document.getElementById('filter-days').value = currentFilters.days;
      }

      // ------- ソート -------
      function sortTable(col) {
        if (sortCol === col) {
          sortDir *= -1;
        } else {
          sortCol = col;
          sortDir = 1;
        }
        // ボタン表示更新
        document.querySelectorAll('.sort-btn').forEach(b => {
          b.classList.remove('active-asc', 'active-desc');
          if (b.dataset.col === col) {
            b.classList.add(sortDir === 1 ? 'active-asc' : 'active-desc');
          }
        });
        renderTable();
      }

      function sortSims(sims) {
        if (!sortCol) return sims;
        return [...sims].sort((a, b) => {
          let va = a[sortCol], vb = b[sortCol];
          if (va === null || va === undefined) va = sortDir === 1 ? Infinity : -Infinity;
          if (vb === null || vb === undefined) vb = sortDir === 1 ? Infinity : -Infinity;
          if (typeof va === 'string') va = va.replace(/[^0-9.]/g, '') || va;
          if (typeof vb === 'string') vb = vb.replace(/[^0-9.]/g, '') || vb;
          const na = parseFloat(va), nb = parseFloat(vb);
          if (!isNaN(na) && !isNaN(nb)) return (na - nb) * sortDir;
          return String(va).localeCompare(String(vb)) * sortDir;
        });
      }

      // ------- 描画ヘルパー -------
      function renderBool(val) {
        if (val === true) return '<span class="ok">○</span>';
        if (val === false) return '<span class="ng">✕</span>';
        return '<span class="unknown">不明</span>';
      }

      function renderTypeWithSize(sim) {
        const type = sim.type || "";
        let badge = "";
        if (type.includes("eSIM")) badge = `<span class="badge badge-esim">eSIM</span>`;
        else if (type.includes("両対応")) badge = `<span class="badge badge-both">両対応</span>`;
        else if (type.includes("物理")) badge = `<span class="badge badge-physical">物理SIM</span>`;
        else badge = `<span class="badge">${type}</span>`;
        if (type.includes("eSIM")) return badge;
        const sizes = sim.sim_sizes;
        if (!sizes || (sizes.nano === null && sizes.micro === null && sizes.standard === null)) {
          return badge + `<br><small class="unknown">サイズ不明</small>`;
        }
        const supported = [];
        if (sizes.nano === true) supported.push("nano");
        if (sizes.micro === true) supported.push("micro");
        if (sizes.standard === true) supported.push("標準");
        const sizeStr = supported.length > 0 ? supported.join(" / ") : '<span class="unknown">不明</span>';
        return badge + `<br><small>${sizeStr}</small>`;
      }

      function renderCountries(countries) {
        if (!countries || countries.length === 0) return '<span class="unknown">不明</span>';
        return `<div class="countries-cell">${countries.map(c => `<span class="country-tag">${c}</span>`).join("")}</div>`;
      }

      function renderNetwork(nets) {
        if (!nets || nets.length === 0) return '<span class="unknown">-</span>';
        return '<span class="network-cell">' + nets.map(n => {
          if (n === "5G") return `<span class="net-tag net-5g">5G</span>`;
          if (n === "4G") return `<span class="net-tag net-4g">4G</span>`;
          if (n === "LTE") return `<span class="net-tag net-lte">LTE</span>`;
          if (n === "3G") return `<span class="net-tag net-3g">3G</span>`;
          return `<span class="net-tag">${n}</span>`;
        }).join("") + "</span>";
      }

      function renderProduct(sim) {
        const imgHtml = sim.image_url
          ? `<div class="product-img"><img data-src="${sim.image_url}" alt="${sim.product_name}" loading="lazy"></div>`
          : `<div class="product-img">準備中</div>`;
        const brandLocal = sim.brand && sim.brand.local ? sim.brand.local : "";
        const companyLocal = sim.company && sim.company.local ? ` / ${sim.company.local}` : "";
        return `<div class="product-cell">
          ${imgHtml}
          <div class="product-info">
            <div class="product-id">${sim.id}</div>
            <div class="product-name">${sim.product_name}</div>
            <div class="product-brand">${brandLocal}${companyLocal}</div>
          </div>
        </div>`;
      }

      function renderPrice(sim) {
        if (sim.price_min === null || sim.price_min === undefined) return '<span class="unknown">-</span>';
        const price = sim.price_min === sim.price_max
          ? `¥${sim.price_min.toLocaleString()}`
          : `¥${sim.price_min.toLocaleString()}〜`;
        const date = sim.price_fetched_at
          ? `<span class="price-date">${sim.price_fetched_at} 時点</span>`
          : "";
        return `<div class="price-cell"><span class="price-val">${price}</span>${date}</div>`;
      }

      function renderReviewScore(sim) {
        // データ取得できていない（null）→ -
        if (sim.review_score === null || sim.review_score === undefined) {
          return '<span class="unknown">-</span>';
        }
        return `<span class="stars">★${sim.review_score.toFixed(1)}</span>`;
      }

      function renderReviewCount(sim) {
        // データ取得できていない（null）→ -
        if (sim.review_count === null || sim.review_count === undefined) {
          return '<span class="unknown">-</span>';
        }
        // 取得できていて0件 → (0件)
        return `<span style="font-size:0.82rem">(${sim.review_count.toLocaleString()}件)</span>`;
      }

      function renderCarrier(sim) {
        const kr = sim.carrier && sim.carrier["韓国"] ? sim.carrier["韓国"] : null;
        if (!kr) return '<span class="unknown">-</span>';
        return `<span style="font-size:0.82rem">${kr}</span>`;
      }

      function renderDataHigh(sim) {
        const v = sim.data_high;
        if (v === null || v === undefined) return '<span class="unknown">-</span>';
        return `<span style="white-space:nowrap">${v}</span>`;
      }

      function renderDataLow(sim) {
        const v = sim.data_low;
        if (v === null || v === undefined) return '<span class="unknown">-</span>';
        if (v === "情報不明") return '<span class="unknown">?</span>';
        return `<span style="white-space:nowrap;font-size:0.82rem">${v}</span>`;
      }

      function renderCompany(sim) {
        const local = sim.company && sim.company.local ? sim.company.local : null;
        if (!local) return '<span class="unknown">-</span>';
        return `<span style="font-size:0.82rem">${local}</span>`;
      }

      function renderBrand(sim) {
        const local = sim.brand && sim.brand.local ? sim.brand.local : null;
        if (!local) return '<span class="unknown">-</span>';
        return `<span style="font-size:0.82rem">${local}</span>`;
      }

      function renderModelNumber(sim) {
        const v = sim.model_number || null;
        if (!v) return '<span class="unknown">-</span>';
        return `<span class="mono-cell">${v}</span>`;
      }

      function renderAsin(sim) {
        if (!sim.asin) return '<span class="unknown">-</span>';
        return `<span class="mono-cell">${sim.asin}</span>`;
      }

      // ------- フィルター適用 -------
      function applyFilters(sims) {
        return sims.filter(s => {
          // 対応国フィルター（韓国を含むもののみ）
          if (!(s.countries || []).includes("韓国")) return false;
          // 種別
          if (currentFilters.type && !s.type.includes(currentFilters.type)) return false;
          // 期間
          if (currentFilters.days) {
            const d = parseInt(currentFilters.days);
            if (d === 999) { if (s.days <= 30) return false; }
            else { if (s.days > d) return false; }
          }
          // 通話
          if (currentFilters.voice === "1" && s.voice_call !== true) return false;
          if (currentFilters.voice === "0" && s.voice_call !== false) return false;
          return true;
        });
      }

      // ------- テーブル描画 -------
      let stickyLeft = null; // 初回のみ計算

      function renderTable() {
        filteredSims = applyFilters(allSims);
        const sorted = sortSims(filteredSims);
        const tbody = document.getElementById("sim-tbody");
        document.getElementById("filter-count").textContent = `${sorted.length}件表示`;

        // DocumentFragmentで一括構築（DOM操作を最小化）
        const frag = document.createDocumentFragment();
        sorted.forEach((sim, idx) => {
          const tr = document.createElement('tr');
          tr.innerHTML = buildRow(sim, idx + 1);
          frag.appendChild(tr);
        });
        tbody.textContent = ''; // innerHTML=''より軽量
        tbody.appendChild(frag);

        // sticky幅は初回のみ計算
        if (stickyLeft === null) {
          requestAnimationFrame(() => {
            const firstTh = document.querySelector('.sim-table th:nth-child(1)');
            if (!firstTh) return;
            stickyLeft = firstTh.getBoundingClientRect().width;
            document.querySelectorAll('.sim-table th:nth-child(2), .sim-table td:nth-child(2)').forEach(el => {
              el.style.left = stickyLeft + 'px';
            });
          });
        } else {
          tbody.querySelectorAll('td:nth-child(2)').forEach(el => {
            el.style.left = stickyLeft + 'px';
          });
        }
      }

      function buildRow(sim, n) {
        const url = sim.affiliate_url || `https://www.amazon.co.jp/dp/${sim.asin}?tag=shotsim-22`;
        const amazonBtn = `<a href="${url}" class="amazon-btn" target="_blank" rel="noopener">Amazonで見る</a>`;
        const price = renderPrice(sim);
        return `
          <td style="text-align:center;color:#aaa;font-size:0.8rem;white-space:nowrap">${n}</td>
          <td>${renderProduct(sim)}</td>
          <td>${price}</td>
          <td>${amazonBtn}</td>
          <td style="text-align:center">${renderTypeWithSize(sim)}</td>
          <td style="text-align:center">${renderDataHigh(sim)}</td>
          <td style="text-align:center">${renderDataLow(sim)}</td>
          <td style="text-align:center;white-space:nowrap">${sim.days != null ? sim.days + '日間' : '<span class="unknown">-</span>'}</td>
          <td style="text-align:center">${renderBool(sim.voice_call)}</td>
          <td style="text-align:center">${renderBool(sim.sms)}</td>
          <td style="text-align:center">${renderBool(sim.tethering)}</td>
          <td>${renderCountries(sim.countries)}</td>
          <td style="text-align:center">${renderCarrier(sim)}</td>
          <td>${renderNetwork(sim.network)}</td>
          <td style="text-align:center">${renderReviewScore(sim)}</td>
          <td style="text-align:center">${renderReviewCount(sim)}</td>
          <td style="text-align:center">${renderCompany(sim)}</td>
          <td style="text-align:center">${renderBrand(sim)}</td>
          <td style="text-align:center">${renderModelNumber(sim)}</td>
          <td style="text-align:center">${renderAsin(sim)}</td>
          <td>${price}</td>
          <td>${amazonBtn}</td>`;
      }

      async function init() {
        initBtnFilter('filter-type-group', 'type');
        initBtnFilter('filter-voice-group', 'voice');
        document.getElementById('filter-days').addEventListener('change', e => {
          prevFilters = { ...currentFilters };
          currentFilters.days = e.target.value;
          renderTable();
        });

        // 国別JSONから取得（全国まとめJSONより高速）
        const res = await fetch("/shotsim/data/sims_" + COUNTRY_KEY + ".json");
        const group = await res.json();
        if (!group || !group.sims) {
          document.getElementById("sim-tbody").innerHTML = '<tr><td colspan="22">データが見つかりません</td></tr>';
          return;
        }
        allSims = group.sims || [];
        const fetched = allSims[0] && allSims[0].price_fetched_at ? allSims[0].price_fetched_at : "不明";
        document.getElementById("data-note").textContent =
          `価格は ${fetched} 時点のAmazon掲載価格です。最新価格はAmazonでご確認ください。`;
        renderTable();
      }

      init();

      // ------- 画像 lazy-load（IntersectionObserver） -------
      const imgObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            if (img.dataset.src) {
              img.src = img.dataset.src;
              delete img.dataset.src;
            }
            imgObserver.unobserve(img);
          }
        });
      }, { rootMargin: '200px' });

      // renderTable後に呼ぶ（MutationObserverで自動検知）
      const tbodyObserver = new MutationObserver(() => {
        document.querySelectorAll('#sim-tbody img[data-src]').forEach(img => {
          imgObserver.observe(img);
        });
      });
      tbodyObserver.observe(document.getElementById('sim-tbody'), { childList: true });
    </script>
