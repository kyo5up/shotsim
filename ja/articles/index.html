<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/shotsim/assets/img/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/shotsim/assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/shotsim/assets/img/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/shotsim/assets/img/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事一覧 | ShotSIM</title>
  <meta name="description" content="海外旅行SIM・通信キャリア解説・SIMの選び方など、旅行に役立つ記事一覧。">
  <meta property="og:title" content="記事一覧 | ShotSIM">
  <meta property="og:description" content="海外旅行SIM・通信キャリア解説・SIMの選び方など、旅行に役立つ記事一覧。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://shotsim.net/ja/articles/">
  <meta property="og:locale" content="ja_JP">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="/shotsim/assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    .articles-list { max-width: 760px; margin: 40px auto; padding: 0 24px 60px; }
    .articles-list h1 { font-size: 1.6rem; margin-bottom: 32px; }
    .section-title { font-size: 1.1rem; font-weight: 600; color: #555; margin: 32px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #1a73e8; }
    .article-item { display: flex; align-items: baseline; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eee; text-decoration: none; color: inherit; }
    .article-item:hover h3 { color: #1a73e8; }
    .article-item .tag { font-size: 0.75rem; background: #f0f4ff; color: #1a73e8; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
    .article-item h3 { font-size: 0.95rem; font-weight: 400; margin: 0; flex: 1; line-height: 1.5; }
    .article-item .date { font-size: 0.8rem; color: #999; white-space: nowrap; }
  </style>
</head>
<body>
  <header>
    <a href="/shotsim/" class="logo">📡 ShotSIM</a>
  </header>

  <div class="articles-list">
    <h1>記事一覧</h1>
    <div id="articles-container"></div>
    <div style="margin-top: 48px;">
      <a href="/shotsim/" style="color: #1a73e8; text-decoration: none; font-size: 0.9rem;">← トップページへ戻る</a>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 ShotSIM. 本サイトはAmazonアソシエイトプログラムに参加しています。</p>
  </footer>

  <script>
    // セクション定義（表示順）
    const sections = [
      {
        title: 'SIMガイド・選び方',
        filter: a => a.tags.some(t => ['基礎知識', '調査・データ', 'eSIM'].includes(t)) && !a.tags.includes('国別ガイド') && !a.tags.includes('キャリア解説')
      },
      {
        title: '国別SIMガイド',
        filter: a => a.tags.includes('国別ガイド')
      },
      {
        title: '通信キャリア解説 - 日本',
        filter: a => a.tags.includes('キャリア解説') && a.tags.includes('日本')
      },
      {
        title: '通信キャリア解説 - 韓国',
        filter: a => a.tags.includes('キャリア解説') && a.tags.includes('韓国')
      },
      {
        title: '通信キャリア解説 - 台湾',
        filter: a => a.tags.includes('キャリア解説') && a.tags.includes('台湾')
      },
      {
        title: '通信キャリア解説 - タイ',
        filter: a => a.tags.includes('キャリア解説') && a.tags.includes('タイ')
      },
      {
        title: '通信キャリア解説 - ベトナム',
        filter: a => a.tags.includes('キャリア解説') && a.tags.includes('ベトナム')
      },
      {
        title: '通信キャリア解説 - アメリカ・ハワイ',
        filter: a => a.tags.includes('キャリア解説') && a.tags.includes('アメリカ・ハワイ')
      },
    ];

    fetch('/shotsim/data/articles.json')
      .then(r => r.json())
      .then(articles => {
        const container = document.getElementById('articles-container');
        // 日付降順にソート
        articles.sort((a, b) => b.date.localeCompare(a.date));

        sections.forEach(section => {
          const items = articles.filter(section.filter);
          if (items.length === 0) return;

          const titleEl = document.createElement('div');
          titleEl.className = 'section-title';
          titleEl.textContent = section.title;
          container.appendChild(titleEl);

          items.forEach(article => {
            const a = document.createElement('a');
            a.href = article.url;
            a.className = 'article-item';
            a.innerHTML = `
              <span class="tag">${article.tags[0]}</span>
              <h3>${article.title}</h3>
              <span class="date">${article.date}</span>
            `;
            container.appendChild(a);
          });
        });
      });
  </script>
</body>
</html>
