    <div class="toast" id="toast"></div>

    <script>
      const _pageCache = {};
      async function openSim(btn) {
        const url = btn.dataset.simUrl;
        if (!url) return;
        if (_pageCache[url] === undefined) {
          try {
            const res = await fetch(url, { method: 'HEAD' });
            _pageCache[url] = res.ok;
          } catch { _pageCache[url] = false; }
        }
        if (_pageCache[url]) {
          location.href = url;
        } else {
          showToast('このSIMの詳細ページは現在準備中です');
        }
      }
      function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2500);
      }
    </script>
