    <link rel="stylesheet" href="/shotsim/assets/css/style.css" />
    <style>
      .page-wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 24px 80px;
      }
      .breadcrumb {
        font-size: 0.8rem;
        color: #aaa;
        margin-bottom: 24px;
      }
      .breadcrumb a {
        color: #1a3263;
        text-decoration: none;
      }
      .breadcrumb a:hover { text-decoration: underline; }
      .brand-heading {
        font-size: 1.8rem;
        font-weight: 700;
        color: #1a3263;
        margin-bottom: 8px;
      }
      .brand-description {
        font-size: 0.95rem;
        color: #444;
        line-height: 1.75;
        margin: 12px 0 24px;
      }
      .info-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
        font-size: 0.9rem;
      }
      .info-table th, .info-table td {
        padding: 10px 14px;
        border-bottom: 1px solid #e8e8e8;
        text-align: left;
        vertical-align: top;
      }
      .info-table th {
        width: 140px;
        font-weight: 600;
        color: #555;
        background: #f8f9ff;
        white-space: nowrap;
      }
      .info-table td { color: #333; }
      .info-table td.empty { color: #bbb; }
      .info-table a { color: #1a3263; word-break: break-all; }
      .info-table a:hover { text-decoration: underline; }
      .section-title {
        font-size: 1rem;
        font-weight: 700;
        color: #1a3263;
        border-left: 4px solid #1a3263;
        padding-left: 10px;
        margin: 32px 0 12px;
      }
      .country-group {
        margin-bottom: 20px;
      }
      .country-group-label {
        font-size: 0.82rem;
        font-weight: 700;
        color: #555;
        background: #f0f4ff;
        border-left: 3px solid #1a3263;
        padding: 4px 10px;
        margin-bottom: 8px;
      }
      .sim-btn-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 0 4px;
      }
      .sim-btn {
        display: inline-flex;
        align-items: center;
        gap: 0;
        border: 1px solid #ccd3e8;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
        overflow: hidden;
        transition: border-color 0.15s, box-shadow 0.15s;
        padding: 0;
        font-size: 0.85rem;
      }
      .sim-btn:hover {
        border-color: #1a3263;
        box-shadow: 0 2px 8px rgba(26,50,99,0.12);
      }
      .sim-btn-body {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 7px 10px;
        color: #222;
      }
      .sim-days { font-weight: 700; color: #1a3263; }
      .sim-data { color: #444; }
      .sim-price { font-weight: 700; color: #c0392b; }
      .sim-sep { color: #bbb; font-size: 0.75rem; }
      .sim-id { font-size: 0.65rem; color: #bbb; margin-left: 4px; }
      .sim-amz {
        display: inline-block;
        padding: 0 10px;
        background: #ff9900;
        color: #fff;
        font-size: 0.72rem;
        font-weight: 700;
        text-decoration: none;
        align-self: stretch;
        display: flex;
        align-items: center;
        border-left: 1px solid #e88a00;
        white-space: nowrap;
      }
      .sim-amz:hover { background: #e68900; }
      /* トースト通知 */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(0);
        background: rgba(30,30,30,0.92);
        color: #fff;
        padding: 10px 22px;
        border-radius: 6px;
        font-size: 0.88rem;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s;
        z-index: 9999;
        white-space: nowrap;
      }
      .toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <header>
      <a href="/shotsim/" class="logo">&#x1F4E1; ShotSIM</a>
      <nav class="lang-nav">
        <a href="/shotsim/ja/brands/iijmio.html" class="active">&#x65E5;&#x672C;&#x8A9E;</a>
      </nav>
    </header>

    <div class="page-wrap">
      <div class="breadcrumb">
        <a href="/shotsim/">トップ</a> &rsaquo; <a href="/shotsim/ja/brands/brands_index.html">ブランド一覧</a> &rsaquo; IIJmio
      </div>

      <h1 class="brand-heading">IIJmio</h1>
      

      <div class="section-title">ブランド情報</div>
      <table class="info-table">
        <tbody>
          <tr><th>会社名</th><td class="empty">-</td></tr><tr><th>本社</th><td class="empty">-</td></tr><tr><th>公式サイト</th><td class="empty">-</td></tr><tr><th>掲載SIM数</th><td class="empty">-</td></tr><tr><th>価格データ取得日</th><td>2026-04-18</td></tr>
        </tbody>
      </table>
      
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const _pageCache = {};
      async function openSim(btn) {
        const url = btn.dataset.simUrl;
        if (!url) return;
        if (_pageCache[url] === undefined) {
          try {
            const res = await fetch(url, { method: 'HEAD' });
            _pageCache[url] = res.ok;
          } catch { _pageCache[url] = false; }
        }
        if (_pageCache[url]) {
          location.href = url;
        } else {
          showToast('このSIMの詳細ページは現在準備中です');
        }
      }
      function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2500);
      }
    </script>
  </body>
</html>
