<!DOCTYPE html>
<!-- updated -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/shotsim/assets/img/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/shotsim/assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/shotsim/assets/img/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/shotsim/assets/img/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShotSIM - 海外旅行SIM比較</title>
  <meta name="description" content="海外旅行先で使えるSIMを比較。韓国・アメリカ・台湾・タイ・ベトナムなど人気の旅行先のSIM情報をまとめています。">
  <!-- OGP -->
  <meta property="og:title" content="ShotSIM - 海外旅行SIM比較">
  <meta property="og:description" content="旅先で使えるSIMをサクッと比較。韓国・アメリカ・台湾・タイ・ベトナムなど人気の旅行先のSIM情報をまとめています。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://shotsim.net">
  <meta property="og:image" content="https://shotsim.net/assets/img/ogp/ogp-site.png">
  <meta property="og:locale" content="ja_JP">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="ShotSIM - 海外旅行SIM比較">
  <meta name="twitter:description" content="旅先で使えるSIMをサクッと比較。">
  <!-- hreflang -->
  <link rel="alternate" hreflang="ja" href="https://shotsim.net/">
  <link rel="alternate" hreflang="en" href="https://shotsim.net/en/">
  <link rel="alternate" hreflang="zh-TW" href="https://shotsim.net/zh-tw/">
  <link rel="alternate" hreflang="zh-CN" href="https://shotsim.net/zh-cn/">
  <link rel="alternate" hreflang="ko" href="https://shotsim.net/ko/">
  <link rel="alternate" hreflang="x-default" href="https://shotsim.net/">
  <link rel="stylesheet" href="/shotsim/assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <a href="/shotsim/" class="logo">📡 ShotSIM</a>
    <nav class="lang-nav">
      <a href="/shotsim/" class="active">日本語</a>
      <a href="/shotsim/en/">English</a>
      <a href="/shotsim/zh-tw/">繁體中文</a>
      <a href="/shotsim/zh-cn/">简体中文</a>
      <a href="/shotsim/ko/">한국어</a>
    </nav>
  </header>

  <!-- 検索エリア -->
  <section class="search-section">
    <h1>旅先のSIMを、すぐ見つける。</h1>
    <p>渡航先を入力して、最適なSIMを比較しよう</p>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="例：韓国、タイ、ハワイ…">
      <button id="search-btn">検索</button>
    </div>
  </section>

  <!-- 国一覧 -->
  <section class="countries-section">
    <h2>人気の旅行先から探す</h2>
    <div class="countries-grid">
      <a href="/shotsim/ja/countries/korea.html" class="country-card">
        <div class="flag">🇰🇷</div>
        <div class="name">韓国</div>
      </a>
      <a href="/shotsim/ja/countries/korea2.html" class="country-card">
        <div class="flag">🇰🇷</div>
        <div class="name">韓国（v2・静的）</div>
      </a>
      <a href="/shotsim/ja/countries/korea3.html" class="country-card">
        <div class="flag">🇰🇷</div>
        <div class="name">韓国（v3・現行）</div>
      </a>
      <a href="/shotsim/ja/countries/usa.html" class="country-card">
        <div class="flag">🇺🇸</div>
        <div class="name">アメリカ・ハワイ</div>
      </a>
      <a href="/shotsim/ja/countries/taiwan.html" class="country-card">
        <div class="flag">🇹🇼</div>
        <div class="name">台湾</div>
      </a>
      <a href="/shotsim/ja/countries/thailand.html" class="country-card">
        <div class="flag">🇹🇭</div>
        <div class="name">タイ</div>
      </a>
      <a href="/shotsim/ja/countries/vietnam.html" class="country-card">
        <div class="flag">🇻🇳</div>
        <div class="name">ベトナム</div>
      </a>
    </div>
  </section>

  <!-- 最新記事・HOT情報 -->
  <section class="articles-section">
    <div class="articles-columns">
      <div class="articles-col">
        <h2>最新記事</h2>
        <div id="latest-articles"></div>
      </div>
      <div class="articles-col">
        <h2>HOT情報</h2>
        <div id="hot-articles"></div>
      </div>
    </div>
    <div style="text-align: right; margin-top: 16px;">
      <a href="/shotsim/ja/articles/" style="color: #1A3263; font-size: 0.9rem; text-decoration: none;">記事一覧を見る →</a>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 ShotSIM. 本サイトはAmazonアソシエイトプログラムに参加しています。</p>
  </footer>

  <script src="/shotsim/assets/js/main.js"></script>
  <script>
    fetch('/shotsim/data/articles.json')
      .then(r => r.json())
      .then(articles => {
        // 日付降順
        articles.sort((a, b) => b.date.localeCompare(a.date));

        // 最新記事：直近5件
        const latest = articles.slice(0, 5);
        // HOT情報：国別ガイド・基礎知識系から5件
        const hot = articles.filter(a =>
          a.tags.includes('国別ガイド') || a.tags.includes('基礎知識') || a.tags.includes('比較')
        ).slice(0, 5);

        function renderList(items, containerId) {
          const container = document.getElementById(containerId);
          items.forEach(article => {
            const a = document.createElement('a');
            a.href = article.url;
            a.className = 'article-card';
            a.innerHTML = `
              <div class="tag">${article.tags[0]}</div>
              <h3>${article.title}</h3>
              <div class="date">${article.date}</div>
            `;
            container.appendChild(a);
          });
        }

        renderList(latest, 'latest-articles');
        renderList(hot, 'hot-articles');
      });
  </script>
</body>
</html>
